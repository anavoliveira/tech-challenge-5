name: "Deploy AWS Prod"

env:
  AWS_REGION: us-east-1
  STACK_NAME: passos-magicos-infra
  ECR_REPOSITORY: passos-magicos

permissions:
  contents: write
  issues: write
  pull-requests: write

on: 
  push:
    branches: 
      - main

jobs:
  build-image:
    name: Build Image
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
          | docker login --username AWS --password-stdin ${{ secrets.REGISTRY }}

      - name: Create ECR Repository if not exists
        run: |
          aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} \
          || aws ecr create-repository \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=true \
            --image-tag-mutability MUTABLE

      - name: Docker Build
        run: |
          docker build \
            -t ${{ env.ECR_REPOSITORY }}:latest \
            -t ${{ env.ECR_REPOSITORY }}:$VERSION \
            -f Dockerfile .

      - name: Tag Docker Image
        run: |
          docker tag ${{ env.ECR_REPOSITORY }}:latest ${{ secrets.REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          docker tag ${{ env.ECR_REPOSITORY }}:$VERSION ${{ secrets.REGISTRY }}/${{ env.ECR_REPOSITORY }}:$VERSION

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ secrets.REGISTRY }}/${{ env.ECR_REPOSITORY }}:$VERSION

  deploy:
    name: Deploy
    needs:
      - build-image
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Cloudformation Stack 
        run: |
          aws cloudformation deploy \
          --template-file infra/cloudformation.yml \
          --stack-name ${{ env.STACK_NAME }} \
          --capabilities CAPABILITY_NAMED_IAM \
          --parameter-overrides ImageTag=$VERSION Environment=prod \
          --no-fail-on-empty-changeset

  release:
    needs:
      - deploy
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout code
        uses: actions/checkout@v4
        with: 
          fetch-depth: 0
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: npm install semantic-release @semantic-release/github @semantic-release/commit-analyzer @semantic-release/release-notes-generator

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
      
      - name: Get version from git tag
        id: get_version
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "version=$VERSION" >> $GITHUB_OUTPUT