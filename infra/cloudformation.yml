AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Passos Magicos — Infraestrutura: IAM Role para SageMaker, SageMaker Model, EndpointConfig, Endpoint e API Gateway público.

Parameters:
  ImageTag:
    Type: String
    Description: Tag da imagem Docker (github.sha)
  GitHubSha:
    Type: String
    Description: Tag da imagem Docker (github.sha)

  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - prod
    Description: Ambiente de deploy

Resources:  
  # 1. IAM Role
  SageMakerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SageMakerExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
      Policies:
        - PolicyName: SageMakerCloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/sagemaker/*
  # 2. SageMaker Model
  SageMakerModel:
    Type: AWS::SageMaker::Model
    Properties:
      # ModelName: !Sub "passos-magicos"
      ModelName: !Sub "passos-magicos-${Environment}-${GitHubSha}"
      PrimaryContainer:
        Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/passos-magicos:${ImageTag}
      ExecutionRoleArn: !GetAtt SageMakerExecutionRole.Arn
  # 3. SageMaker EndpointConfig
  SageMakerEndpointConfig:
    Type: AWS::SageMaker::EndpointConfig
    Properties:
      EndpointConfigName: !Sub passos-magicos-${Environment}-${GitHubSha}
      ProductionVariants:
        - VariantName: AllTraffic
          ModelName: !GetAtt SageMakerModel.ModelName
          ServerlessConfig:
            MemorySizeInMB: 2048
            MaxConcurrency: 10
  # 4. SageMaker Endpoint 
  SageMakerEndpoint:
    Type: AWS::SageMaker::Endpoint
    Properties:
      EndpointName: !Sub passos-magicos-${Environment}
      EndpointConfigName: !GetAtt SageMakerEndpointConfig.EndpointConfigName
  # 5. IAM Role — API Gateway → SageMaker
  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ApiGatewayToSageMakerRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeSageMakerEndpoint
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sagemaker:InvokeEndpoint
                Resource: !Sub arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:endpoint/passos-magicos-${Environment}
  # 6. API Gateway REST API
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub passos-magicos-${Environment}
      Description: API pública para predição de risco de defasagem escolar
      EndpointConfiguration:
        Types:
          - REGIONAL

  # Recurso /predict
  PredictResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: predict

  # Recurso /health
  HealthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: health

  # 7. Método POST /predict → SageMaker (integração direta, sem Lambda)
  PredictMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref PredictResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:runtime.sagemaker:path//endpoints/passos-magicos-${Environment}/invocations
        Credentials: !GetAtt ApiGatewayRole.Arn
        PassthroughBehavior: WHEN_NO_TEMPLATES
        RequestTemplates:
          application/json: "$input.body"
        IntegrationResponses:
          - StatusCode: '200'
            ResponseTemplates:
              application/json: "$input.body"
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            application/json: Empty

  # 8. Método GET /health → resposta estática (mock)
  HealthMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref HealthResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseTemplates:
              application/json: '{"status": "ok"}'
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            application/json: Empty

  # 9. Deploy e Stage do API Gateway
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PredictMethod
      - HealthMethod
    Properties:
      RestApiId: !Ref RestApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref Environment

# Outputs
Outputs:
  SageMakerExecutionRoleArn:
    Description: ARN da role do SageMaker
    Value: !GetAtt SageMakerExecutionRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-SageMakerExecutionRoleArn

  SageMakerEndpointName:
    Description: Nome do endpoint SageMaker
    Value: !GetAtt SageMakerEndpoint.EndpointName
    Export:
      Name: !Sub ${AWS::StackName}-SageMakerEndpointName

  ECRImageUri:
    Description: URI da imagem utilizada neste deploy
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/passos-magicos:${ImageTag}

  ApiEndpointUrl:
    Description: URL publica do endpoint de predicao (sem autenticacao AWS)
    Value: !Sub https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/predict
    Export:
      Name: !Sub ${AWS::StackName}-ApiEndpointUrl